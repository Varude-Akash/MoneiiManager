<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moneii Legal</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #131b33;
        --text: #e8ecf5;
        --muted: #a8b2cc;
        --accent: #7c5cff;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #080b18, var(--bg));
        color: var(--text);
      }
      .wrap {
        max-width: 720px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid #253056;
        border-radius: 16px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 30px;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
      }
      ul {
        margin-top: 20px;
      }
      li {
        margin: 10px 0;
      }
      a {
        color: #9fc7ff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .pill {
        display: inline-block;
        margin-top: 12px;
        padding: 6px 10px;
        border: 1px solid #3a4b7f;
        border-radius: 999px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Moneii Legal Documents</h1>
        <p>
          Public legal pages for app stores and users.
        </p>
        <span class="pill">MoneiiManager</span>
        <ul>
          <li><a href="./privacy-policy.html">Privacy Policy</a></li>
          <li><a href="./terms-of-service.html">Terms of Service</a></li>
          <li><a href="./delete-account.html">Account Deletion</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
